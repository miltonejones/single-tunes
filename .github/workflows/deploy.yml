name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches:
      - main
      - develop
      - staging

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build:prod

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Select deploy target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "bucket=single-tunes-production-os2z74ji" >> "$GITHUB_OUTPUT"
            echo "distribution_id=E1EB03MS7FEBF8" >> "$GITHUB_OUTPUT"
          else
            echo "bucket=single-tunes-staging-idgx5geq" >> "$GITHUB_OUTPUT"
            echo "distribution_id=E35UP0GTF4N0XT" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to S3
        run: aws s3 sync dist/single-tunes/browser/ "s3://${{ steps.target.outputs.bucket }}/" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.target.outputs.distribution_id }}" --paths "/*"

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const environment = '${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}';
            const emoji = status === 'success' ? '✅' : '❌';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${emoji} Deployment to ${environment} ${status}`
            });
