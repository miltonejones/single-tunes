@if (track(); as currentTrack) {
  <div class="audio-player">
    <div class="audio-player-row audio-player-row-top">
      <button type="button" class="audio-player-expand-trigger" (click)="isExpanded.set(true)">
        @if (podcastArt()) {
          <img class="audio-player-art" [src]="podcastArt()" alt="Podcast artwork" />
        }

        <div class="audio-player-info">
          <div class="audio-player-title">{{ currentTrack.title }}</div>
          <div class="audio-player-artist">{{ podcastName() }}</div>
        </div>
      </button>

      <button type="button" class="audio-player-queue-btn" (click)="queuePanel.toggle()">
        <i class="fa-solid fa-list"></i>
      </button>
    </div>

    <div class="audio-player-row audio-player-row-bottom">
      <div class="audio-player-controls">
        <button type="button" (click)="skip(-30)" title="Rewind 30 seconds">
          <i class="fa-solid fa-arrow-rotate-left"></i>
          <span class="skip-btn-label">30</span>
        </button>
        <button type="button" class="audio-player-play-btn" (click)="togglePlayPause()">
          <i class="fa-solid" [class.fa-pause]="isPlaying()" [class.fa-play]="!isPlaying()"></i>
        </button>
        <button type="button" (click)="skip(30)" title="Forward 30 seconds">
          <i class="fa-solid fa-arrow-rotate-right"></i>
          <span class="skip-btn-label">30</span>
        </button>
        <button type="button" (click)="close()"><i class="fa-solid fa-stop"></i></button>
      </div>

      <span class="audio-player-time">{{ currentTimeLabel() }}</span>
      <input
        class="audio-player-progress"
        type="range"
        min="0"
        max="100"
        [value]="progress()"
        [style.background]="
          'linear-gradient(to right, var(--accent-from) ' +
          progress() +
          '%, var(--surface-2) ' +
          progress() +
          '%)'
        "
        (input)="onSeekInput($event)"
      />
      <span class="audio-player-time">{{ durationLabel() }}</span>
    </div>
  </div>

  <!-- Expanded mobile view -->
  @if (isExpanded()) {
    <div class="audio-player-fullscreen">
      <div class="audio-player-fullscreen-topbar">
        <button type="button" class="audio-player-fullscreen-close" (click)="isExpanded.set(false)">
          <i class="fa-solid fa-chevron-down"></i>
        </button>
      </div>

      @if (podcastArt()) {
        <img class="audio-player-fullscreen-art" [src]="podcastArt()" alt="Podcast artwork" />
      }

      <div class="audio-player-fullscreen-info">
        <div class="audio-player-fullscreen-title">{{ currentTrack.title }}</div>
        <div class="audio-player-fullscreen-artist">{{ podcastName() }}</div>
      </div>

      <input
        class="audio-player-fullscreen-progress"
        type="range"
        min="0"
        max="100"
        [value]="progress()"
        [style.background]="
          'linear-gradient(to right, var(--accent-from) ' +
          progress() +
          '%, var(--surface-2) ' +
          progress() +
          '%)'
        "
        (input)="onSeekInput($event)"
      />
      <div class="audio-player-fullscreen-time-row">
        <span>{{ currentTimeLabel() }}</span>
        <span>{{ durationLabel() }}</span>
      </div>

      <div class="audio-player-fullscreen-controls">
        <button type="button" (click)="queuePanel.toggle()" title="Episode queue">
          <i class="fa-solid fa-list"></i>
        </button>
        <button type="button" (click)="skip(-30)">
          <i class="fa-solid fa-arrow-rotate-left"></i>
        </button>
        <button type="button" class="audio-player-fullscreen-play-btn" (click)="togglePlayPause()">
          <i class="fa-solid" [class.fa-pause]="isPlaying()" [class.fa-play]="!isPlaying()"></i>
        </button>
        <button type="button" (click)="skip(30)">
          <i class="fa-solid fa-arrow-rotate-right"></i>
        </button>
        <button type="button" (click)="close()"><i class="fa-solid fa-stop"></i></button>
      </div>
    </div>
  }
}
