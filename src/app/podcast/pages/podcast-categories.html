<lib-breadcrumbs [items]="breadcrumbItems()" />

@if (loading() && !podcasts()) {
  <lib-loading-animation variant="visualizer" label="Loading categories" />
} @else if (podcasts()?.length === 0) {
  <div class="text-center py-5">
    <h3>No categories found</h3>
    <p class="text-muted">Try refreshing the page or check your connection.</p>
  </div>
} @else {
  @for (group of groups(); track group[0]) {
    <div class="section-header">
      <h3><i class="fa-solid fa-tag"></i> {{ group[0] }}</h3>
    </div>
    <div class="row g-2" style="padding: 0 1rem">
      @for (podcast of group[1]; track podcast.feedUrl) {
        <lib-podcast-card [podcast]="podcast" />
      }
    </div>
  }
}
