<lib-breadcrumbs [items]="breadcrumbItems()" />

@if (subscriptionsService.subscriptions().length === 0) {
  <div class="text-center py-5">
    <h3>No subscriptions yet</h3>
    <p class="text-muted">Start by searching for podcasts and subscribing to your favorites!</p>
  </div>
} @else {
  <div class="section-header">
    <h3><i class="fa-solid fa-podcast"></i> My Subscriptions</h3>
  </div>
  <div class="row g-2" style="padding: 0 1rem">
    @for (podcast of subscriptionsService.subscriptions(); track podcast.feedUrl) {
      <lib-podcast-card [podcast]="podcast" />
    }
  </div>
}
